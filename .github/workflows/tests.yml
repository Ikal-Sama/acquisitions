name: Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      NODE_OPTIONS: --experimental-vm-modules
      DATABASE_URL: postgres://neon:npg@localhost:5432/neondb?sslmode=require

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: test
        continue-on-error: true
        run: |
          npm test -- --coverage --coverageReporters=text --coverageReporters=lcov --coverageReporters=json-summary 2>&1 | tee test-output.txt
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      - name: Annotate failures
        if: env.EXIT_CODE != '0'
        run: |
          echo "::error::Tests failed. See the 'Run tests with coverage' step for details."
          echo ""
          echo "### ❌ Tests failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run \`npm test\` locally to reproduce." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/**
            test-output.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Generate coverage summary
        if: success() || failure()
        run: |
          {
            echo "### 🧪 Test & Coverage Summary"
            echo ""
            if [ -f coverage/coverage-summary.json ]; then
              echo "| Metric     | Covered |"
              echo "|------------|---------|"
              for k in lines statements functions branches; do
                pct=$(node -e "const c=require('./coverage/coverage-summary.json');process.stdout.write(c.total && c.total['$k'] ? c.total['$k'].pct+'%' : 'n/a')")
                echo "| $k | $pct |"
              done
            else
              echo "_No coverage summary was generated._"
            fi
            echo ""
            echo "📦 Coverage artifact retained for 30 days."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail the job if tests failed
        if: env.EXIT_CODE != '0'
        run: |
          echo "Tests exited with code $EXIT_CODE"
          exit 1
