name: Docker Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    name: Build and Push Production Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/acquisitions
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=prod-{{ date 'YYYYMMDD-HHmmss' }},enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=acquisitions
            org.opencontainers.image.description=Acquisitions API
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created={{ date 'YYYY-MM-DDTHH:mm:ssZZZZZ' }}

      - name: Set up cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          provenance: false

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Append GitHub summary
        if: always()
        run: |
          {
            echo "### 🐳 Docker Image Published"
            echo ""
            echo "**Image:** \`${{ secrets.DOCKER_USERNAME }}/acquisitions\`"
            echo ""
            echo "**Tags:**"
            echo ""
            echo "${{ steps.meta.outputs.tags }}" | tr ' ' '\n' | sed 's/^/- `/' | sed 's/$/`/'
            echo ""
            echo "**Platforms:** \`linux/amd64\`, \`linux/arm64\`"
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Triggered by:** \`${{ github.event_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
