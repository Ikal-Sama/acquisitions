apiVersion: apps/v1
kind: Deployment
metadata:
  name: acquisitions
  namespace: acquisitions
  labels:
    app: acquisitions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acquisitions
  template:
    metadata:
      labels:
        app: acquisitions
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      containers:
        - name: app
          image: acquisitions:prod
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DATABASE_URL
              value: postgresql://acquisitions:acquisitions@postgres:5432/acquisitions
            - name: DATABASE_DRIVER
              value: pg
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '3000'
            - name: LOG_LEVEL
              value: info
            - name: ARCJET_ENV
              value: production
            - name: ARCJET_KEY
              valueFrom:
                secretKeyRef:
                  name: acquisitions-secret
                  key: ARCJET_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: acquisitions-secret
                  key: JWT_SECRET
            - name: TMPDIR
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '256Mi'
              cpu: '500m'
