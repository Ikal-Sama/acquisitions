apiVersion: batch/v1
kind: Job
metadata:
  name: acquisitions-migration
  namespace: acquisitions
spec:
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: migrate
          image: acquisitions:prod
          imagePullPolicy: IfNotPresent
          command:
            - node
            - scripts/migrate.local.js
          env:
            - name: DATABASE_URL
              value: postgresql://acquisitions:acquisitions@postgres:5432/acquisitions
            - name: TMPDIR
              value: /tmp
          volumeMounts:
            - name: tmp
              mountPath: /tmp
