# DO NOT commit real values. Create the secret from .env.production instead:
#
#   kubectl create secret generic acquisitions-secret \
#     --namespace=acquisitions \
#     --from-literal=DATABASE_URL='postgres://...@ep-xxx-pooler.region.aws.neon.tech/neondb?sslmode=require' \
#     --from-literal=ARCJET_KEY='...' \
#     --from-literal=JWT_SECRET='...' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Or run: ./scripts/k8s-minikube.sh up
#
# DATABASE_URL must be the Neon Cloud pooled connection string — not neon-local.

apiVersion: v1
kind: Secret
metadata:
  name: acquisitions-secret
  namespace: acquisitions
type: Opaque
stringData:
  DATABASE_URL: 'postgres://neondb_owner:PASSWORD@ep-xxx-pooler.region.aws.neon.tech/neondb?sslmode=require'
  ARCJET_KEY: 'your-arcjet-key'
  JWT_SECRET: 'your-long-random-jwt-secret'
